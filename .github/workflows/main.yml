name: CI Pipeline

# Automattically trigger push events to the main branch
on:
  push:
    branches: 
      - main


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Run tests
        run: npm test -- --ci


  deploy:
    needs: test
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.MODULE_PROJECT_VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.MODULE_PROJECT_VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run:  vercel pull --yes --environment=production --token=${{ secrets.MODULE_PROJECT_TOKEN }}
      
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.MODULE_PROJECT_TOKEN }}
      
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.MODULE_PROJECT_TOKEN }}